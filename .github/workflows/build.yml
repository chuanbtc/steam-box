name: Build All

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  go-server:
    name: Go Server
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: darwin
            goarch: arm64
            suffix: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o steam-box${{ matrix.suffix }} ./cmd/server/

      - name: Build bridge
        if: matrix.goos == 'windows'
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -ldflags="-H windowsgui -s -w" -o cdk-bridge.exe ./cmd/bridge/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            steam-box${{ matrix.suffix }}
            cdk-bridge.exe
            scripts/
            static/admin.html

  opensteamtool-dll:
    name: OpenSteamTool DLL
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream
        run: git clone --depth 1 https://github.com/OpenSteam001/OpenSteamTool.git ost

      - name: Apply CDK patch
        shell: pwsh
        run: pwsh -File ost-patch/apply_patch.ps1 -OstRoot ost

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        working-directory: ost
        run: |
          cmake -S src -B build -G "Ninja Multi-Config"
          cmake --build build --config Release

      - name: Upload DLLs
        uses: actions/upload-artifact@v4
        with:
          name: OpenSteamTool-CDK-DLLs
          path: |
            ost/build/Release/OpenSteamTool.dll
            ost/build/Release/dwmapi.dll
            ost/build/Release/xinput1_4.dll
